<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REZAR</title>
    <link href="main.css" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="rezarlogo.ico">
</head>

<body>
    <header>
        <div class="title-container">
            <a href="#" class="main-head-name">REZAR</a>
        </div>
    </header>
    <main>
        <!-- form section -->
        <section>
            <form method="POST" action="#">
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="full-name">Name (required):</label>
                    <input type="text" id="full-name" name="name" placeholder="e.g., John Doe" required size="20">

                    <label for="email">Email address (required):</label>
                    <input placeholder="example@email.com" required id="email" type="email" name="email" size="20" />
                    <label for="age">Age (optional):</label>
                    <input type="number" name="age" id="age" min="3" max="100" />
                </fieldset>

                <fieldset>
                    <legend>Was this your first time at our hotel?</legend>
                    <input id="yes-option" type="radio" name="hotel-stay" value="yes" />
                    <label for="yes-option">Yes</label>
                    <input id="no-option" type="radio" name="hotel-stay" value="no" />
                    <label for="no-option">No</label>
                </fieldset>

                <fieldset>
                    <legend>
                        Why did you choose to stay at our hotel? (Check all that apply)
                    </legend>

                    <input type="checkbox" id="ads" name="choice" value="ads" />
                    <label for="ads">Social Media Ads</label>

                    <input type="checkbox" id="recommendation" name="choice" value="recommendation" />
                    <label for="recommendation">Personal Recommendation</label>

                    <input type="checkbox" id="location" name="choice" value="location" />
                    <label for="location">Location</label>

                    <input checked type="checkbox" id="reputation" name="choice" value="reputation" />
                    <label for="reputation">Reputation</label>

                    <input type="checkbox" id="price" name="choice" value="price" />
                    <label for="price">Price</label>
                </fieldset>

                <fieldset>
                    <legend>Ratings</legend>

                    <label for="service">How was the service?</label>

                    <select name="service" id="service">
                        <option value="poor">Poor</option>
                        <option value="satisfactory">Satisfactory</option>
                        <option value="good">Good</option>
                        <option value="very-good">Very Good</option>
                        <option selected value="excellent">Excellent</option>
                    </select>

                    <label for="food">How was the food?</label>

                    <select name="food" id="food">
                        <option value="poor">Poor</option>
                        <option value="satisfactory">Satisfactory</option>
                        <option value="good">Good</option>
                        <option value="very-good">Very Good</option>
                        <option selected value="excellent">Excellent</option>
                    </select>
                </fieldset>

                <label for="comments">Other Comments?</label>
                <textarea cols="30" rows="10" name="comments" id="comments"></textarea>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
</body>

</html>
