<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REZAR | Tech Talk And Software Production </title>
    <link href="main.css" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="../images/faviconSmall.png">
</head>

<body>
    <header>
        <div>
            <a href="index.html"><img src="../images/subject.png"></a>
            <a href="index.html" class="main-head-name">REZAR</a>
        </div>
    </header>
    <main>
        <section class="page">
            <h1>Content here</h1>
        </section>
        <section class="page">
            <h1>content here</h1>
        </section>

        <section class="page">
            <h1>content here</h1>
        </section>

        <section class="page">
            <form method="POST" action="https://formspree.io/f/mbdqpvev">
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="first-name">Name:</label>
                    <input type="text" id="first-name" name="name" placeholder="e.g., John" required size="20"><br>

                    <label for="surname">Surname:</label>
                    <input type="text" id="surname" name="name" placeholder="e.g., Doe" required size="20"><br>

                    <label for="email">Email:</label>
                    <input placeholder="example@email.com" required id="email" type="email" name="email"
                        size="20" /><br>

                    <label for="age">Age:</label>
                    <input type="number" name="age" id="age" min="3" max="100" /><br>
                </fieldset>

                <!-- <fieldset>
                    <legend>Was this your first time at our hotel?</legend>
                    <input id="yes-option" type="radio" name="hotel-stay" value="yes" />
                    <label for="yes-option">Yes</label>
                    <input id="no-option" type="radio" name="hotel-stay" value="no" />
                    <label for="no-option">No</label>
                </fieldset> -->

                <fieldset>
                    <legend>
                        What device have you viewed this site on?
                    </legend>

                    <input type="checkbox" id="smartphone" name="device-choice" value="smartphone" />
                    <label for="smartphone">Smartrphone</label>

                    <input type="checkbox" id="laptop" name="device-choice" value="laptop" />
                    <label for="laptop">Laptop</label>

                    <input type="checkbox" id="smart-tv" name="device-choice" value="smart-tv" />
                    <label for="smart-tv">Smart TV</label>

                    <input type="checkbox" id="tablet" name="device-choice" value="tablet" />
                    <label for="tablet">Tablet</label>

                    <!-- <input type="checkbox" id="price" name="choice" value="price" />
                    <label for="price">Price</label> -->
                </fieldset>

                <fieldset>
                    <legend>Ratings</legend>

                    <label for="site-rating">How would you rate this site?</label>

                    <select name="site-rating" id="site-rating">
                        <option value="poor">Poor</option>
                        <option value="satisfactory">Satisfactory</option>
                        <option value="good">Good</option>
                        <option value="very-good">Very Good</option>
                        <option selected value="excellent">Excellent</option>
                    </select><br>

                    <label for="comaptibility">How is compatibility with your device(s)?</label>

                    <select name="comaptibility" id="comaptibility">
                        <option value="poor">Poor</option>
                        <option value="satisfactory">Satisfactory</option>
                        <option value="good">Good</option>
                        <option value="very-good">Very Good</option>
                        <option selected value="excellent">Excellent</option>
                    </select><br>
                </fieldset>

                <fieldset>
                    <legend>Message To The Team</legend>
                    <!-- <label for="comments">Other Comments?</label> -->
                    <textarea cols="30" rows="10" name="comments" id="comments"
                        placeholder="Additional Comments Here......"></textarea>

                </fieldset>

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>
</body>

</html>
